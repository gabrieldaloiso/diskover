<div class="track-container">
  <div class="track-list-header">
    <button (click)="goBack()" class="back-button">← Retour</button>
    <h2>Liste des titres de : {{ albumTitle }}</h2>
    @if (albumCover) {
      <img [src]="albumCover" [alt]="albumTitle" class="album-cover">
    }
  </div>

  <ul>
    @for (t of tracks; track t.id) {
      <li>
        <span class="track-name">
          {{ t.name }}
          @if (t.duration_ms) {
            <span class="duration"> — {{ formatDuration(t.duration_ms) }}</span>
          }
        </span>
        @if (t.preview_url) {
          <audio controls [src]="t.preview_url"></audio>
        }
      </li>
    } @empty {
      <p>Aucune piste trouvée.</p>
    }
  </ul>
</div>
