<div class="track-container" style="padding: 20px;">
  <button (click)="goBack()" class="back-button">← Retour</button>

  <h2>Liste des titres</h2>

  <ul>
    @for (t of tracks; track t.id) {
      <li>
        {{ t.name }}
        @if (t.duration_ms) {
          <span> — {{ formatDuration(t.duration_ms) }}</span>
        }
        @if (t.preview_url) {
          <audio controls [src]="t.preview_url" style="display:block; margin-top: 4px;"></audio>
        }
      </li>
    } @empty {
      <p>Aucune piste trouvée.</p>
    }
  </ul>
</div>
