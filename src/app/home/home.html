

<app-search (onFilter)="onSearch($event)"></app-search>

@if(artists.length > 0) {
  <div class="artist-grid">
    @for(artist of artists; track artist.id) {
      <app-artist [artist]="artist" (eventOut)="onArtistSelected($event)"></app-artist>
    }
  </div>
} @else if(hasSearched) {
  <p>Aucun artiste trouvé.</p>
} @else {
  <p>Recherche ton artiste préféré !</p>
}
