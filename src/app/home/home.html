<app-search (onFilter)="onSearch($event)"></app-search>

@if(hasSearched) {
  <div class="section-title">Résultats de recherche</div>
  <div class="artist-grid">
    @for(artist of artists; track artist.id) {
      <app-artist [artist]="artist" (eventOut)="onArtistSelected($event)"></app-artist>
    } @empty {
      <p>Aucun artiste trouvé.</p>
    }
  </div>
} @else {
  <div class="section-title">🔥 Top 10 artistes en ce moment</div>
  <div class="top-artists">
    @for(artist of topArtists; track artist.id) {
      <app-artist [artist]="artist" (eventOut)="onArtistSelected($event)"></app-artist>
    }
  </div>
}
